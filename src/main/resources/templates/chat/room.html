<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Request Chat - ERMS</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="_csrf" th:content="${_csrf.token}">
    <meta name="_csrf_header" th:content="${_csrf.headerName}">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .chat-shell { display: grid; grid-template-rows: auto 1fr auto; height: 100vh; background: var(--bg); }
        .chat-topbar { display: flex; align-items: center; gap: 14px; padding: 18px 24px; background: rgba(255,255,255,0.85); border-bottom: 1px solid var(--border); backdrop-filter: blur(10px); }
        .chat-topbar h2 { font-size: 1.12rem; font-weight: 800; }
        .chat-topbar p { color: var(--muted); font-size: 0.88rem; }
        .chat-messages { overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 14px; }
        .msg-bubble { max-width: 68%; padding: 13px 16px; border-radius: 20px; font-size: 0.98rem; line-height: 1.45; }
        .msg-bubble.mine { background: var(--primary); color: white; margin-left: auto; border-bottom-right-radius: 5px; }
        .msg-bubble.other { background: rgba(255,255,255,0.90); border: 1px solid var(--border); margin-right: auto; border-bottom-left-radius: 5px; }
        .msg-meta { font-size: 0.78rem; margin-bottom: 5px; font-weight: 700; }
        .msg-bubble.mine .msg-meta { color: rgba(255,255,255,0.75); }
        .msg-bubble.other .msg-meta { color: var(--muted); }
        .chat-input-bar { display: flex; gap: 12px; padding: 18px 24px; background: rgba(255,255,255,0.85); border-top: 1px solid var(--border); backdrop-filter: blur(10px); }
        .chat-input-bar input { flex: 1; border-radius: 999px; padding: 14px 20px; }
        .chat-input-bar button { border-radius: 999px; min-height: 48px; padding: 0 22px; }
        .chat-compose { display: grid; gap: 12px; padding: 18px 24px; background: rgba(255,255,255,0.85); border-top: 1px solid var(--border); backdrop-filter: blur(10px); }
        .chat-input-row { display: grid; grid-template-columns: 1fr auto; gap: 12px; }
        .chat-input-row input { border-radius: 999px; padding: 14px 20px; }
        .chat-send-btn,
        .chat-send-btn[type="button"] {
            width: 48px;
            height: 48px;
            min-height: 48px;
            padding: 0;
            display: inline-grid;
            place-items: center;
            border: 0;
            outline: 0;
            background: transparent;
            color: var(--primary);
            box-shadow: none;
            border-radius: 999px;
            cursor: pointer;
        }
        .chat-send-btn:hover,
        .chat-send-btn:focus {
            background: rgba(15,108,116,0.08);
            border: 0;
            box-shadow: none;
        }
        .chat-send-btn:disabled {
            opacity: 0.45;
            cursor: not-allowed;
        }
        .chat-send-btn svg { width: 27px; height: 27px; stroke-width: 2; }
        .chat-meta { font-size: 0.78rem; color: var(--muted); margin-top: 8px; }
        .msg-bubble.mine .chat-meta { color: rgba(255,255,255,0.75); }
        @media (max-width: 640px) {
            .msg-bubble { max-width: 100%; }
            .chat-input-row { grid-template-columns: minmax(0, 1fr) 48px; }
            .chat-compose { padding: 14px; }
        }
    </style>
</head>
<body>
<div class="chat-shell">
    <div class="chat-topbar">
        <div class="brand-mark" style="background:var(--primary-soft);width:42px;height:42px;border-radius:14px;display:grid;place-items:center;">
            <i data-lucide="message-square" style="width:20px;height:20px;stroke:var(--primary);"></i>
        </div>
        <div>
            <h2>Emergency Chat - Request #<span th:text="${requestId}"></span></h2>
            <p th:if="${chatActive}">Shared chat for admin, user, and assigned volunteer</p>
            <p th:unless="${chatActive}">This request is closed. Message history is read-only.</p>
        </div>
    </div>

    <div class="chat-messages" id="chatBox">
        <div th:each="msg : ${history}"
             th:class="${msg.sender.username == currentUser ? 'msg-bubble mine' : 'msg-bubble other'}">
            <div class="msg-meta" th:text="${(msg.senderName != null ? msg.senderName : msg.sender.fullName) + ' - ' + msg.sender.role}"></div>
            <div th:if="${msg.message != null and !msg.message.isBlank()}" th:text="${msg.message}"></div>
        </div>
    </div>

    <div th:if="${chatActive}" class="chat-compose">
        <div class="chat-input-row">
            <input id="msgInput" type="text" placeholder="Type your message..." autocomplete="off">
            <button id="sendBtn" type="button" class="chat-send-btn" aria-label="Send message"><i data-lucide="send"></i></button>
        </div>
    </div>

    <div th:unless="${chatActive}" class="chat-input-bar" style="display:block;">
        <div class="empty-state">
            <i data-lucide="circle-check-big"></i>
            <h4 th:text="${request.status.name() == 'CANCELLED' ? 'This request was cancelled - chat is now closed' : 'This request has been resolved - chat is now closed'}"></h4>
            <p>
                The emergency request is marked as
                <strong th:text="${request.status}"></strong>.
                The conversation remains visible for review, but no new messages can be sent.
            </p>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>
<script th:inline="javascript">
    lucide.createIcons();

    const room = [[${room}]];
    const currentUser = [[${currentUser}]];
    const chatActive = [[${chatActive}]];
    const chatBox = document.getElementById("chatBox");
    const socket = new SockJS("/ws");
    const stompClient = Stomp.over(socket);

    stompClient.connect({}, () => {
        stompClient.subscribe("/topic/chat/" + room, (msg) => {
            const data = JSON.parse(msg.body);
            const isMine = data.senderUsername === currentUser;
            const bubble = document.createElement("div");
            bubble.className = "msg-bubble " + (isMine ? "mine" : "other");
            let html = `<div class="msg-meta">${escapeHtml(data.senderName)} - ${escapeHtml(data.role)}</div>`;
            if (data.message) {
                html += `<div>${escapeHtml(data.message)}</div>`;
            }
            bubble.innerHTML = html;
            chatBox.appendChild(bubble);
            chatBox.scrollTop = chatBox.scrollHeight;
        });
    });

    if (chatActive) {
        document.getElementById("sendBtn").addEventListener("click", sendMessage);
        document.getElementById("msgInput").addEventListener("keydown", (e) => {
            if (e.key === "Enter") sendMessage();
        });
    }

    function sendMessage() {
        if (!chatActive) return;
        const input = document.getElementById("msgInput");
        const text = input.value.trim();
        if (!text) return;

        stompClient.send("/app/chat/" + room, {}, JSON.stringify({ message: text }));
        input.value = "";
    }

    function escapeHtml(text) {
        const div = document.createElement("div");
        div.textContent = text || "";
        return div.innerHTML;
    }

    chatBox.scrollTop = chatBox.scrollHeight;
</script>
</body>
</html>
